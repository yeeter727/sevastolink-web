<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SEVASTOLINK</title>
  <link rel="stylesheet" href="style.css">
  <link rel="prefetch" href="terminal/index.html">
  <link rel="prefetch" href="postload.js">
  <link rel="icon" type="image/x-icon" href="images/favicon.ico">
</head>
<body>
  <div id="screen">
    <img src="images/scanlines.png" id="scan">
    <img src="images/bezel.png" id="bezel">

    <div id="header">
        <img id="logo" src="images/sevastolink_logo.gif">
	<div id="subheading">AN LM-LINK PRODUCT</div>
    </div>

    <!-- Loading Bar -->
    <div class="progress-container">
      <div class="progress-bar"></div>
    </div>

	<div id="footer">© LM-LINK DATA SYSTEMS</div>
  </div>
  <script type="text/javascript">
	window.addEventListener('load', () => {
  	const bar = document.querySelector('.progress-bar');

  	// When the loading bar animation ends, jump directly to /terminal/
  	bar.addEventListener('animationend', () => {
    	window.location.href = 'terminal/';
  	}, { once: true });
	});
  </script>
</body>
</html>
